<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>EventHorizon - Event Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="head">
    <div class="navbar">
        <div style="font-weight: bold; font-size: 1.5rem; color: var(--accent);">
            <span class="bi bi-calendar-check"></span> EventHorizon
        </div>
        <div id="nav-actions"></div>
    </div>
    <div class="announcement-bar">
  <div class="announcement-track">
    🎉 New Events Available • Reserve Your Seats Now • Limited Tickets • Book Fast 🚀
  </div>
</div>
<br><br>
  
    <div class="dashboardcontrols">
        <div class="statbox">
            <div style="flex-grow: 1;">
                <div style="font-size: 0.7rem; color: var(--text-dim);">TOTAL EVENTS</div>
                <div id="totalcount" style="font-size: 1.4rem; font-weight: bold; color: var(--accent);">0</div>
            </div>
            <span class="bi bi-layers" style="font-size: 1.5rem; color: var(--accent);"></span>
        </div>

        <div class="searchbox">
            <span class="bi bi-search" style="margin-right: 10px; color: var(--accent);"></span>
            <input type="text" id="searchInput" placeholder="Search events..." onkeyup="filterEvents()">
        </div>
    </div>

    <div class="cardpar" id="cardcontainer"></div>

    <div id="loginModal" class="modal-overlay">
        <h3 style="margin-top: 0; color: var(--accent);">Admin Login</h3>
        <p style="font-size: 0.85rem; color: var(--text-dim);">Enter administrator password.</p>
        <input type="password" id="adminPassword" placeholder="Password">
        <div id="loginError" style="color: var(--danger); font-size: 0.8rem; display: none; margin-bottom: 10px;">Incorrect password.</div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="attemptAdminLogin()" class="btn-primary" style="flex: 2;">Login</button>
            <button onclick="closeModals()" class="btn-secondary" style="flex: 1;">Cancel</button>
        </div>
    </div>
    
    <div id="userAuthModal" class="modal-overlay">
        <h3 id="authTitle" style="margin-top: 0; color: var(--accent);">User Login</h3>
        <input type="text" id="userName" placeholder="Username">
        <input type="password" id="userPassword" placeholder="Password">
        <div id="authError" style="color: var(--danger); font-size: 0.8rem; display: none; margin-bottom: 10px;"></div>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <button onclick="handleUserAuth()" class="btn-primary" id="authSubmitBtn">Login</button>
            <button onclick="toggleAuthMode()" class="btn-secondary" id="authToggleBtn">Need an account? Register</button>
            <button onclick="closeModals()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <div id="bookingsModal" class="modal-overlay" style="width: 400px;">
        <h3 style="margin-top: 0; color: var(--accent);">My Bookings</h3>
        <div id="myBookingsList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button onclick="closeModals()" class="btn-secondary" style="width: 100%;">Close</button>
    </div>

    <form id="eventform" class="modal-overlay">
        <h3 style="margin-top: 0; color: var(--accent);">New Event</h3>
        <select id="eventtype">
            <option value="Conference">Conference</option>
            <option value="Webinar">Webinar</option>
            <option value="Workshop">Workshop</option>
            <option value="Social">Social</option>
        </select>
        <input type="text" id="eventname" placeholder="Event Name" required>
        <input type="date" id="eventdate" required>
        <input type="text" id="eventlocation" placeholder="Location" required>
        <input type="number" id="totalseats" placeholder="Total Seats" required>
        <textarea id="eventdescription" placeholder="Description"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" class="btn-primary" style="flex: 2;">Save Event</button>
            <button type="button" onclick="closeModals()" class="btn-secondary" style="flex: 1;">Cancel</button>
        </div>
    </form>
   </div>
   <script src="script.js"></script>
</body>
</html>
