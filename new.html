<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>EventHorizon - Event Manager</title>
    <style>
        :root {
            --bg: #050805;
            --card-bg: #0D140D;
            --border: #2D3F2D;
            --text-main: #D3C6AA;
            --text-dim: #859289;
            --accent: #A7C080;
            --danger: #E67E80;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
           
        }
        
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid #1a231a;
            padding-bottom: 15px;
        }

        .dashboardcontrols { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
            align-items: center;
        }

        .statbox { 
            display: flex; 
            align-items: center; 
            background: var(--card-bg);
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            min-width: 180px; 
        }

        .searchbox { 
            border: 1px solid var(--border); 
            padding: 10px; 
            border-radius: 8px; 
            background: var(--card-bg); 
            display: flex; 
            align-items: center; 
            flex-grow: 1;
            max-width: 400px;
        }

        .searchbox input {
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            width: 100%;
        }

        .cardpar { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
        }

        .cards {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 320px;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .cards:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            z-index: 100;
            width: 350px;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            background: #1a231a;
            color: var(--text-main);
            box-sizing: border-box;
        }

        progress { 
            width: 100%; 
            height: 8px; 
            margin: 15px 0; 
        }

        progress::-webkit-progress-bar { background-color: #1a231a; border-radius: 4px; }
        progress::-webkit-progress-value { background-color: var(--accent); border-radius: 4px; }

        /* Buttons */
        .btn-primary { 
            background: var(--accent);
            color: var(--bg); 
            border: none; 
            padding: 10px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }

        .btn-secondary {
            background: var(--border); 
            color: var(--text-main); 
            border: none; 
            padding: 10px 15px; 
            border-radius: 5px;
            cursor: pointer;
        }

        .btnbook { 
            width: 100%; 
            background: var(--accent); 
            color: var(--bg); 
            border: none; 
            padding: 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: auto; 
            font-weight: bold;
        }

        .btnbook:disabled { 
            background: var(--border); 
            color: var(--text-dim);
            cursor: not-allowed; 
        }

        .delete-link {
            text-align: center; 
            color: var(--danger);
            font-size: 0.8rem; 
            margin-top: 15px; 
            cursor: pointer;
            text-decoration: underline;
        }

        .logout-link {
            color: var(--danger);
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 15px;
            border: 1px solid var(--danger);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .booking-item {
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
  .announcement-bar {
  width: 100%;
  overflow: hidden;
  background: black;
  color: white;
  padding: 12px 0;
  position: relative;
}

.announcement-track {
  display: inline-block;
  white-space: nowrap;
  animation: marquee 15s linear infinite;
  font-weight: 500;
  font-size: 14px;
  font-size: larger;
}

@keyframes marquee {
  from {
    transform: translateX(100%);
  }
  to {
    transform: translateX(-100%);
  }
}

    </style>
</head>
<body>
   <div class="head">
    <div class="navbar">
        <div style="font-weight: bold; font-size: 1.5rem; color: var(--accent);">
            <span class="bi bi-calendar-check"></span> EventHorizon
        </div>
        <div id="nav-actions"></div>
    </div>
    <div class="announcement-bar">
  <div class="announcement-track">
    🎉 New Events Available • Reserve Your Seats Now • Limited Tickets • Book Fast 🚀
  </div>
</div>
<br><br>
  
    <div class="dashboardcontrols">
        <div class="statbox">
            <div style="flex-grow: 1;">
                <div style="font-size: 0.7rem; color: var(--text-dim);">TOTAL EVENTS</div>
                <div id="totalcount" style="font-size: 1.4rem; font-weight: bold; color: var(--accent);">0</div>
            </div>
            <span class="bi bi-layers" style="font-size: 1.5rem; color: var(--accent);"></span>
        </div>

        <div class="searchbox">
            <span class="bi bi-search" style="margin-right: 10px; color: var(--accent);"></span>
            <input type="text" id="searchInput" placeholder="Search events..." onkeyup="filterEvents()">
        </div>
    </div>

    <div class="cardpar" id="cardcontainer"></div>

    <div id="loginModal" class="modal-overlay">
        <h3 style="margin-top: 0; color: var(--accent);">Admin Login</h3>
        <p style="font-size: 0.85rem; color: var(--text-dim);">Enter administrator password.</p>
        <input type="password" id="adminPassword" placeholder="Password">
        <div id="loginError" style="color: var(--danger); font-size: 0.8rem; display: none; margin-bottom: 10px;">Incorrect password.</div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="attemptAdminLogin()" class="btn-primary" style="flex: 2;">Login</button>
            <button onclick="closeModals()" class="btn-secondary" style="flex: 1;">Cancel</button>
        </div>
    </div>
    
    <div id="userAuthModal" class="modal-overlay">
        <h3 id="authTitle" style="margin-top: 0; color: var(--accent);">User Login</h3>
        <input type="text" id="userName" placeholder="Username">
        <input type="password" id="userPassword" placeholder="Password">
        <div id="authError" style="color: var(--danger); font-size: 0.8rem; display: none; margin-bottom: 10px;"></div>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <button onclick="handleUserAuth()" class="btn-primary" id="authSubmitBtn">Login</button>
            <button onclick="toggleAuthMode()" class="btn-secondary" id="authToggleBtn">Need an account? Register</button>
            <button onclick="closeModals()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <div id="bookingsModal" class="modal-overlay" style="width: 400px;">
        <h3 style="margin-top: 0; color: var(--accent);">My Bookings</h3>
        <div id="myBookingsList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button onclick="closeModals()" class="btn-secondary" style="width: 100%;">Close</button>
    </div>

    <form id="eventform" class="modal-overlay">
        <h3 style="margin-top: 0; color: var(--accent);">New Event</h3>
        <select id="eventtype">
            <option value="Conference">Conference</option>
            <option value="Webinar">Webinar</option>
            <option value="Workshop">Workshop</option>
            <option value="Social">Social</option>
        </select>
        <input type="text" id="eventname" placeholder="Event Name" required>
        <input type="date" id="eventdate" required>
        <input type="text" id="eventlocation" placeholder="Location" required>
        <input type="number" id="totalseats" placeholder="Total Seats" required>
        <textarea id="eventdescription" placeholder="Description"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" class="btn-primary" style="flex: 2;">Save Event</button>
            <button type="button" onclick="closeModals()" class="btn-secondary" style="flex: 1;">Cancel</button>
        </div>
    </form>
   </div>
    <script>
        // --- State Management ---
        let isAdmin = false;
        let currentUser = JSON.parse(sessionStorage.getItem('currentUser')) || null;
        let isRegisterMode = false;

        // --- Core UI Logic ---
        function updateUIForRole() {
            const nav = document.getElementById('nav-actions');
            
            if (isAdmin) {
                nav.innerHTML = `
                    <button class="btn-primary" onclick="showEventForm()"><span class="bi bi-plus"></span> Create Event</button>
                    <a class="logout-link" onclick="logout()">Logout Admin</a>`;
            } else if (currentUser) {
                nav.innerHTML = `
                    <span style="color: var(--accent); margin-right:10px">Hello, ${currentUser.username}</span>
                    <button class="btn-secondary" onclick="showBookings()"><span class="bi bi-ticket-perforated"></span> My Bookings</button>
                    <a class="logout-link" onclick="logout()">Logout</a>`;
            } else {
                nav.innerHTML = `
                    <button class="btn-secondary" onclick="showUserModal()" style="margin-right:10px">User Login</button>
                    <button class="btn-primary" onclick="showLoginModal()">Admin Access</button>`;
            }
            renderCards();
        }

        // --- Auth Handlers ---
        function showLoginModal() { closeModals(); document.getElementById('loginModal').style.display = 'block'; }
        function showUserModal() { 
            closeModals();
            isRegisterMode = false;
            updateAuthModalText();
            document.getElementById('userAuthModal').style.display = 'block'; 
        }
        function showEventForm() { document.getElementById('eventform').style.display = 'block'; }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            updateAuthModalText();
        }

        function updateAuthModalText() {
            document.getElementById('authTitle').innerText = isRegisterMode ? "Create Account" : "User Login";
            document.getElementById('authSubmitBtn').innerText = isRegisterMode ? "Register" : "Login";
            document.getElementById('authToggleBtn').innerText = isRegisterMode ? "Already have an account? Login" : "Need an account? Register";
        }

        function closeModals() {
            const modals = ['.modal-overlay'];
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('authError').style.display = 'none';
        }

        function attemptAdminLogin() {
            if (document.getElementById('adminPassword').value === "admin123") {
                isAdmin = true;
                currentUser = null;
                sessionStorage.removeItem('currentUser');
                closeModals();
                updateUIForRole();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function handleUserAuth() {
            const user = document.getElementById('userName').value.trim();
            const pass = document.getElementById('userPassword').value.trim();
            if(!user || !pass) return;

            let users = JSON.parse(localStorage.getItem('eventUsers')) || [];

            if (isRegisterMode) {
                if (users.find(u => u.username === user)) {
                    showAuthError("User already exists");
                    return;
                }
                const newUser = { id: Date.now(), username: user, password: pass, bookings: [] };
                users.push(newUser);
                localStorage.setItem('eventUsers', JSON.stringify(users));
                login(newUser);
            } else {
                const found = users.find(u => u.username === user && u.password === pass);
                if (found) login(found);
                else showAuthError("Invalid credentials");
            }
        }

        function login(userObj) {
            currentUser = userObj;
            sessionStorage.setItem('currentUser', JSON.stringify(userObj));
            isAdmin = false;
            closeModals();
            updateUIForRole();
        }

        function logout() {
            isAdmin = false;
            currentUser = null;
            sessionStorage.removeItem('currentUser');
            updateUIForRole();
        }

        function showAuthError(msg) {
            const err = document.getElementById('authError');
            err.innerText = msg;
            err.style.display = 'block';
        }

        // --- Event Management ---
        document.getElementById('eventform').addEventListener('submit', function(e) {
            e.preventDefault();
            const total = parseInt(document.getElementById('totalseats').value);
            const newEvent = {
                id: Date.now(),
                type: document.getElementById('eventtype').value,
                name: document.getElementById('eventname').value,
                date: document.getElementById('eventdate').value,
                location: document.getElementById('eventlocation').value,
                totalSeats: total,
                availableSeats: total,
                desc: document.getElementById('eventdescription').value
            };
            const events = JSON.parse(localStorage.getItem('myEvents')) || [];
            events.push(newEvent);
            localStorage.setItem('myEvents', JSON.stringify(events));
            renderCards();
            this.reset();
            closeModals();
        });

        function renderCards() {
            const events = JSON.parse(localStorage.getItem('myEvents')) || [];
            const container = document.getElementById('cardcontainer');
            container.innerHTML = '';
            document.getElementById('totalcount').innerText = events.length;

            events.forEach(event => {
                const filled = event.totalSeats - event.availableSeats;
                const isBooked = currentUser && currentUser.bookings.includes(event.id);
                
                let btnText = "Reserve Seat";
                let disabled = false;

                if (event.availableSeats <= 0) { btnText = "Sold Out"; disabled = true; }
                if (isAdmin) { btnText = "Admin View"; disabled = true; }
                if (isBooked) { btnText = "Already Reserved"; disabled = true; }

                const card = document.createElement('div');
                card.className = 'cards';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: bold; color: var(--text-dim);">
                        <span>${event.type.toUpperCase()}</span>
                        <span style="color: ${event.availableSeats > 0 ? 'var(--accent)' : 'var(--danger)'}">${event.availableSeats} Left</span>
                    </div>
                    <div style="font-weight: bold; font-size: 1.2rem; margin: 12px 0; color: var(--text-main);">${event.name}</div>
                    <div style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 10px;">
                        <span class="bi bi-calendar"></span> ${event.date} | <span class="bi bi-geo-alt"></span> ${event.location}
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px;">${event.desc || ""}</div>
                    <progress value="${filled}" max="${event.totalSeats}"></progress>
                    <button class="btnbook" onclick="bookTicket(${event.id})" ${disabled ? 'disabled' : ''}>${btnText}</button>
                    ${isAdmin ? `<div class="delete-link" onclick="deleteEvent(${event.id})">Remove Event</div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        // --- Booking Logic ---
        function bookTicket(id) {
            if (!currentUser) {
                alert("Please log in to reserve a seat.");
                showUserModal();
                return;
            }

            let events = JSON.parse(localStorage.getItem('myEvents')) || [];
            let users = JSON.parse(localStorage.getItem('eventUsers')) || [];
            
            const event = events.find(e => e.id === id);
            const userIdx = users.findIndex(u => u.id === currentUser.id);

            if (event && event.availableSeats > 0 && !users[userIdx].bookings.includes(id)) {
                event.availableSeats--;
                users[userIdx].bookings.push(id);
                
                localStorage.setItem('myEvents', JSON.stringify(events));
                localStorage.setItem('eventUsers', JSON.stringify(users));
                
                // Sync session
                currentUser = users[userIdx];
                sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                renderCards();
                alert("Reservation confirmed!");
            }
        }

        function showBookings() {
            const events = JSON.parse(localStorage.getItem('myEvents')) || [];
            const list = document.getElementById('myBookingsList');
            list.innerHTML = '';
            
            const myEvents = events.filter(e => currentUser.bookings.includes(e.id));
            
            if (myEvents.length === 0) {
                list.innerHTML = '<p style="color: var(--text-dim)">No active reservations.</p>';
            } else {
                myEvents.forEach(e => {
                    list.innerHTML += `
                        <div class="booking-item">
                            <div>
                                <div style="font-weight:bold">${e.name}</div>
                                <div style="font-size:0.75rem; color:var(--text-dim)">${e.date}</div>
                            </div>
                            <span class="bi bi-check-circle" style="color:var(--accent)"></span>
                        </div>`;
                });
            }
            document.getElementById('bookingsModal').style.display = 'block';
        }

        function deleteEvent(id) {
            if (!confirm("Are you sure?")) return;
            let events = JSON.parse(localStorage.getItem('myEvents')) || [];
            events = events.filter(e => e.id !== id);
            localStorage.setItem('myEvents', JSON.stringify(events));
            renderCards();
        }

        function filterEvents() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.cards').forEach(card => {
                const title = card.querySelector('div:nth-child(2)').innerText.toLowerCase();
                card.style.display = title.includes(term) ? "" : "none";
            });
        }

        // Init
        updateUIForRole();
    </script>
</body>
</html>
